<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="description" content="Login page for TravelMate travel planner web application.">
  <meta name="keywords" content="login, travel planner, JavaScript validation">
  <meta name="author" content="Gabriele Rotundo">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>TravelMate | Login</title>

  <link rel="stylesheet" href="css/style.css">
  <script src="js/main.js" defer></script>
  <script src="js/login.js" defer></script>
</head>

<body>
  <header class="site-header">
    <nav class="navbar">
      <a href="index.html" class="logo">
  <img src="assets/images/logo.svg" alt="TravelMate logo" class="logo-img">
  <span>TravelMate</span>
</a>

      <button class="menu-toggle" id="menuToggle" aria-label="Open navigation menu">
        ☰
      </button>

      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="destinations.html">Destinations</a>
        <a href="index.html#how-it-works">How it works</a>

        <div class="auth-links" id="authLinks">
        </div>
      </div>
    </nav>
  </header>

  <main class="login-main">
    <section class="login-card">
      <div class="section-heading">
        <p class="eyebrow">Welcome back</p>
        <h1>Login to TravelMate</h1>
        <p>
          Access your personal itinerary and save your favourite destinations.
        </p>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input 
            type="text" 
            id="username" 
            name="username" 
            placeholder="Enter your username"
          >
          <small class="error-message" id="usernameError"></small>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="Enter your password"
          >
          <small class="error-message" id="passwordError"></small>
        </div>

        <button type="submit" class="btn primary-btn full-width-btn">
          Login
        </button>

        <p class="form-message" id="formMessage"></p>
      </form>

      <p class="login-hint">
        Demo login: use any username and a password with at least 6 characters.
      </p>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 TravelMate. Web development university project.</p>
  </footer>
</body>
</html>
